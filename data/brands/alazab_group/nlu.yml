version: "3.1"

nlu:
  # ── Greet ────────────────────────────────────────────
  - intent: greet
    examples: |
      - مرحبا
      - أهلاً
      - السلام عليكم
      - هاي
      - صباح الخير
      - مساء الخير
      - هلو
      - أهلاً وسهلاً
      - ازيك
      - كيف الحال
      - ابدأ
      - مرحبا بك
      - هلا والله
      - يا هلا
      - هلا
      - أهلين

  # ── Goodbye ──────────────────────────────────────────
  - intent: goodbye
    examples: |
      - مع السلامة
      - وداعاً
      - باي
      - إلى اللقاء
      - شكراً ومع السلامة
      - تصبح على خير
      - تصبحون على خير
      - الله معك
      - في أمان الله
      - انتهيت
      - خلاص

  # ── Affirm ───────────────────────────────────────────
  - intent: affirm
    examples: |
      - نعم
      - أيوه
      - صح
      - بالظبط
      - تمام
      - موافق
      - أكيد
      - بكل سرور
      - طبعاً
      - إيه
      - اوكي
      - ماشي
      - صحيح
      - بالضبط

  # ── Deny ─────────────────────────────────────────────
  - intent: deny
    examples: |
      - لا
      - لأ
      - لا شكراً
      - مش محتاج
      - مش عايز
      - لا لا
      - أبداً
      - مش تمام
      - لا يهمني

  # ── Thanks ───────────────────────────────────────────
  - intent: thanks
    examples: |
      - شكراً
      - شكراً جزيلاً
      - متشكر
      - ممنون
      - جزاك الله خيراً
      - مشكور
      - شكراً كتير
      - يسلم
      - يعطيك العافية
      - بارك الله فيك

  # ── Ask Help ─────────────────────────────────────────
  - intent: ask_help
    examples: |
      - ايه اللي تقدر تعمله
      - ايش تقدر تسوي
      - ازاي تقدر تساعدني
      - محتاج مساعدة
      - عايز أعرف خدماتكم
      - ايه الخدمات المتاحة
      - ممكن تساعدني
      - في ايه تقدر تفيدني
      - عرفني بنفسك
      - ايه اللي بتعمله

  # ── Bot Challenge ────────────────────────────────────
  - intent: bot_challenge
    examples: |
      - هل أنت بوت
      - هل أنت روبوت
      - هل أنت إنسان
      - بتتكلم مع واحد حقيقي
      - أنت بشر ولا آلة
      - هل أنت ذكاء اصطناعي
      - من أنت
      - مين أنت

  # ── Out of Scope ─────────────────────────────────────
  - intent: out_of_scope
    examples: |
      - ايه أخبار الكورة
      - كلمني عن السياسة
      - حكيلي نكتة
      - ايه الطقس بكرة
      - احجزلي تذكرة طيران
      - ترجملي النص ده
      - اكتبلي كود برمجي
