<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AzBot Widget Demo</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #f5f5f7, #eceff4);
      font-family: Cairo, sans-serif;
      display: grid;
      place-items: center;
    }
    .hero {
      max-width: 760px;
      padding: 56px 24px;
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      color: #122038;
    }
    p {
      margin: 0;
      color: #667085;
      line-height: 1.9;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>معاينة AzBot</h1>
    <p>هذه الصفحة لعرض الودجت بالشكل النهائي. افتح الزر العائم أسفل الصفحة أو استدعه برمجياً.</p>
  </div>
  <script src="./alazab-chat-widget.js"></script>
  <script>
    window.AlazabChatWidget.init({
      apiUrl: `${location.origin}/chat`,
      brand: 'uberfix',
      headerTitle: 'عزبوت (AzBot)',
      headerSubtitle: 'المساعد الذكي — متصل الآن'
    });
  </script>
</body>
</html>
