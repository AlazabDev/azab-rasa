version: "3.1"

# ============================================================
#  domain.yml — الدومين الموحد لمجموعة العزب (CALM)
#  ملاحظة: يستخدم هذا الملف مع مجلد domain/ المجزأ.
#  الـ slots والـ responses هنا مكملة لما في domain/
# ============================================================

# ══════════════════════════════════════════════════════════════
#  Intents — كل intents المستخدمة في ملفات data/
# ══════════════════════════════════════════════════════════════
intents:
  - affirm
  - ask_alazab_about
  - ask_alazab_contact
  - ask_alazab_projects
  - ask_alazab_quote
  - ask_alazab_services
  - ask_brand_industries
  - ask_brand_portfolio
  - ask_brand_process
  - ask_brand_quote
  - ask_brand_services
  - ask_help
  - ask_laban_bulk_order
  - ask_laban_catalog
  - ask_laban_contact
  - ask_laban_delivery
  - ask_laban_products
  - ask_luxury_materials
  - ask_luxury_portfolio
  - ask_luxury_quote
  - ask_luxury_services
  - ask_luxury_timeline
  - ask_uberfix_emergency
  - ask_uberfix_request
  - ask_uberfix_services
  - ask_uberfix_subscription
  - ask_uberfix_tracking
  - bot_challenge
  - deny
  - goodbye
  - greet
  - out_of_scope
  - session_start
  - thanks

# ══════════════════════════════════════════════════════════════
#  Slots — كل الـ slots المستخدمة في الـ flows
# ══════════════════════════════════════════════════════════════
slots:
  # ── هوية البراند ──────────────────────────────────────────
  brand:
    type: text
    mappings:
      - type: from_llm

  agent_name:
    type: text
    initial_value: "مساعد العزب"
    mappings:
      - type: controlled

  service_type:
    type: text
    mappings:
      - type: from_llm

  # ── بيانات العميل ─────────────────────────────────────────
  user_name:
    type: text
    mappings:
      - type: from_llm

  user_phone:
    type: text
    mappings:
      - type: from_llm

  user_message:
    type: text
    mappings:
      - type: from_llm

  # ── تأكيد التحويل لموظف بشري ─────────────────────────────
  confirm_human_handoff:
    type: categorical
    values:
      - "Yes"
      - "No"
    mappings:
      - type: from_llm

  # ── تقييم تجربة المستخدم ─────────────────────────────────
  feedback_rating:
    type: categorical
    values:
      - thumbs_up
      - thumbs_down
    mappings:
      - type: from_llm

  # ── أسئلة مقترحة للـ help flow ───────────────────────────
  example_questions:
    type: text
    mappings:
      - type: controlled

# ══════════════════════════════════════════════════════════════
#  Responses — كل الـ utterances المستخدمة في الـ flows
# ══════════════════════════════════════════════════════════════
responses:

  # ── Slots collect (يجب أن يطابق اسم الـ slot) ─────────────
  utter_ask_feedback_rating:
    - text: "كيف تقيّم تجربتك معنا اليوم؟ 🌟"
      buttons:
        - title: "👍 ممتاز"
          payload: "/SetSlots(feedback_rating=thumbs_up)"
        - title: "👎 يمكن تحسينه"
          payload: "/SetSlots(feedback_rating=thumbs_down)"

  utter_ask_confirm_human_handoff:
    - text: "هل تريد التحدث مع أحد موظفينا مباشرة؟"
      buttons:
        - title: "✅ نعم"
          payload: "/SetSlots(confirm_human_handoff=Yes)"
        - title: "❌ لا"
          payload: "/SetSlots(confirm_human_handoff=No)"

  utter_ask_user_name:
    - text: "ما اسمك الكريم؟"

  utter_ask_user_phone:
    - text: "ما رقم التواصل معك؟"

  utter_ask_user_message:
    - text: "اكتب رسالتك أو طلبك باختصار:"

  # ── Hello / Welcome ────────────────────────────────────────
  utter_greet:
    - text: "أهلاً بك في مجموعة العزب. كيف أقدر أساعدك اليوم؟"
      metadata:
        rephrase: true

  utter_hello:
    - text: "أهلاً وسهلاً! كيف يمكنني مساعدتك اليوم؟ 😊"
      metadata:
        rephrase: true

  utter_welcome:
    - text: |
        مرحبًا بك في مجموعة العزب! 👋
        أنا مساعدك الذكي — هنا لمساعدتك في خدمات مجموعتنا المتكاملة.

        🏗️ *Alazab Construction* — تنفيذ المشروعات المعمارية
        ✨ *Luxury Finishing* — التشطيبات الراقية
        🎨 *Brand Identity* — هوية العلامات التجارية
        🔧 *UberFix* — الصيانة والتشغيل الذكي
        🧱 *Laban Alasfour* — التوريدات والخامات

        جرّب أحد هذه الأسئلة:
        - ما هي خدمات Alazab Construction؟
        - أريد عرض سعر لمشروع تشطيب
        - أحتاج صيانة عاجلة
        - أريد طلب مواد بناء بالجملة
      metadata:
        rephrase: true

  # ── Help / FAQs ────────────────────────────────────────────
  utter_what_can_you_do:
    - text: |
        أستطيع مساعدتك في خدمات مجموعة العزب المتكاملة:

        🏗️ *Alazab Construction* — تنفيذ المشروعات السكنية والتجارية
        ✨ *Luxury Finishing* — التشطيبات الراقية
        🎨 *Brand Identity* — تصميم وتنفيذ هوية العلامات التجارية
        🔧 *UberFix* — الصيانة الذكية (كهرباء، سباكة، تكييف)
        🧱 *Laban Alasfour* — مواد البناء والخامات بالجملة

        يمكنني أيضًا:
        - تقديم عروض أسعار وتحويل طلباتك
        - تتبع طلبات الصيانة
        - التحويل لموظف بشري عند الحاجة
      metadata:
        rephrase: true

  utter_top_faqs:
    - text: |
        إليك بعض الأسئلة الشائعة:

        🏗️ ما هي خدمات Alazab Construction؟
        ✨ ما خيارات التشطيب المتاحة؟
        🎨 كيف تعملون على الهوية التجارية؟
        🔧 أحتاج صيانة عاجلة
        🧱 أريد طلب مواد بناء بالجملة
      metadata:
        rephrase: true

  utter_ask_help:
    - text: |
        أقدر أساعدك في خدمات مجموعة العزب: مقاولات، تشطيبات، هوية تجارية، صيانة، وتوريدات.
        اكتب الخدمة المطلوبة أو اطلب عرض سعر وسأجمع البيانات اللازمة.
      metadata:
        rephrase: true

  utter_bot_challenge:
    - text: "أنا مساعد مجموعة العزب الذكي، أساعدك في الاستفسارات وطلبات التواصل."
      metadata:
        rephrase: true

  # ── Goodbye / Feedback ────────────────────────────────────
  utter_goodbye:
    - text: "شكرًا لتواصلك مع مجموعة العزب. نتطلع لخدمتك دائمًا! 🤝"
    - text: "وداعًا! لا تتردد في التواصل معنا في أي وقت. 😊"

  utter_thanks:
    - text: "العفو، تحت أمرك في أي وقت."
      metadata:
        rephrase: true

  utter_thankyou_positive:
    - text: "سعيد بذلك! شكرًا على تقييمك الإيجابي. 🎉"
    - text: "رائع! يسعدنا أن تجربتك كانت جيدة. نراك قريبًا! 😊"

  utter_thankyou_negative:
    - text: "نشكرك على صراحتك. ملاحظاتك تساعدنا على التحسين المستمر. 🙏"

  # ── Human Handoff ─────────────────────────────────────────
  utter_transferring_to_human:
    - text: "سيتم تحويلك لأحد موظفينا خلال لحظات. شكرًا لصبرك! ⏳"

  utter_human_handoff_cancelled:
    - text: "حسنًا، لا مشكلة. كيف يمكنني مساعدتك؟"
      metadata:
        rephrase: true

  utter_transfer_to_manager:
    - text: "سأحوّل ملخص المحادثة التالي لفريقنا:\n{summary}"

  # ── Lead ──────────────────────────────────────────────────
  utter_lead_submitted:
    - text: "✅ شكراً! وصل طلبك وسيتواصل معك فريقنا في أقرب وقت."

  # ── Cannot Handle ─────────────────────────────────────────
  utter_no_relevant_answer_found:
    - text: "عذراً، لم أجد إجابة مناسبة. هل تريد التحدث مع أحد موظفينا؟"
      metadata:
        rephrase: true

  utter_out_of_scope:
    - text: "السؤال خارج نطاق خدمات مجموعة العزب. أقدر أساعدك في المقاولات، التشطيبات، الهوية التجارية، الصيانة أو التوريدات."
      metadata:
        rephrase: true

  utter_help:
    - text: "كيف يمكنني مساعدتك اليوم؟"
      metadata:
        rephrase: true

  # ── Brands ────────────────────────────────────────────────
  utter_alazab_services:
    - text: |
        🏗️ *Alazab Construction* تقدم:
        • إدارة وتنفيذ المشروعات السكنية
        • المشروعات التجارية والخدمية
        • الإشراف الهندسي الكامل
        هل تريد عرض سعر؟
      metadata:
        rephrase: true

  utter_luxury_services:
    - text: |
        ✨ *Luxury Finishing* متخصصة في:
        • تشطيبات الوحدات السكنية الراقية
        • التصميم الداخلي الفاخر
        • الإشراف على التنفيذ بدقة عالية
      metadata:
        rephrase: true

  utter_brand_services:
    - text: |
        🎨 *Brand Identity* تنفذ:
        • تصميم وتنفيذ هوية العلامة التجارية
        • تجهيز المحلات والمساحات التجارية
        • من الفكرة حتى التسليم الكامل
      metadata:
        rephrase: true

  utter_uberfix_services:
    - text: |
        🔧 *UberFix* — منصة الصيانة الذكية:
        • صيانة كهرباء، سباكة، تكييف
        • صيانة دورية للمنازل والمنشآت
        • عقود تشغيل سنوية
      metadata:
        rephrase: true

  utter_laban_products:
    - text: |
        🧱 *Laban Alasfour* توفر:
        • مواد البناء والخامات المعمارية
        • مستلزمات التشطيب والصيانة
        • خامات بكميات الجملة والتجزئة
      metadata:
        rephrase: true

  utter_alazab_contact:
    - text: |
        يمكنك التواصل مع فريق Alazab Construction مباشرة عبر رقم المبيعات أو إرسال بياناتك هنا وسيتواصل معك الفريق.
        اكتب اسمك ورقم هاتفك ونوع المشروع المطلوب.
      metadata:
        rephrase: true

  utter_alazab_about:
    - text: |
        Alazab Construction متخصصة في تنفيذ وإدارة المشروعات السكنية والتجارية مع إشراف هندسي ومتابعة حتى التسليم.
      metadata:
        rephrase: true

  utter_alazab_projects:
    - text: |
        يمكن لفريق Alazab Construction عرض نماذج مشاريع مناسبة حسب نوع المشروع والمساحة والمدينة.
        اكتب نوع المشروع المطلوب وسنوجهك للخطوة التالية.
      metadata:
        rephrase: true

  utter_alazab_quote:
    - text: |
        للحصول على عرض سعر من Alazab Construction، ارسل اسمك ورقم هاتفك ونوع المشروع والمساحة التقريبية.
      metadata:
        rephrase: true

  utter_luxury_materials:
    - text: |
        Luxury Finishing تستخدم خامات مناسبة لمستوى التشطيب المطلوب مثل الرخام، البورسلين، الأخشاب، الدهانات والاضاءة.
        ارسل مستوى التشطيب والمساحة لنرشح خيارات أقرب.
      metadata:
        rephrase: true

  utter_luxury_portfolio:
    - text: |
        يمكننا عرض نماذج من أعمال Luxury Finishing حسب نوع الوحدة والمساحة ومستوى التشطيب المطلوب.
        ارسل نوع المشروع وسنرشح لك نماذج مناسبة.
      metadata:
        rephrase: true

  utter_luxury_quote:
    - text: |
        للحصول على عرض سعر تشطيب، ارسل المساحة، حالة الاستلام، مستوى التشطيب المطلوب ورقم التواصل.
      metadata:
        rephrase: true

  utter_luxury_timeline:
    - text: |
        مدة التشطيب تختلف حسب المساحة ومستوى التفاصيل وتوفر الخامات.
        ارسل مساحة الوحدة وحالة الاستلام لنحدد جدولاً زمنياً أقرب للواقع.
      metadata:
        rephrase: true

  utter_brand_portfolio:
    - text: |
        لدى Brand Identity أعمال في تجهيز الهويات التجارية، الواجهات، اللافتات، وتجهيز نقاط البيع.
        ارسل نوع النشاط وسنقترح نماذج قريبة.
      metadata:
        rephrase: true

  utter_brand_process:
    - text: |
        مراحل العمل تشمل: فهم النشاط، تصور الهوية، التصميم، اعتماد الخامات، التنفيذ، ثم التسليم النهائي.
      metadata:
        rephrase: true

  utter_brand_quote:
    - text: |
        للحصول على عرض سعر Brand Identity، ارسل نوع النشاط، المساحة، المدينة، والخدمة المطلوبة.
      metadata:
        rephrase: true

  utter_brand_industries:
    - text: |
        نخدم قطاعات مثل المطاعم، الكافيهات، الصيدليات، المحلات، المكاتب ونقاط البيع.
      metadata:
        rephrase: true

  utter_uberfix_request:
    - text: |
        لتسجيل طلب صيانة UberFix، ارسل نوع العطل، العنوان أو المنطقة، ورقم التواصل.
      metadata:
        rephrase: true

  utter_uberfix_subscription:
    - text: |
        UberFix توفر باقات صيانة دورية للمنازل والمنشآت حسب عدد الزيارات ونوع الخدمة المطلوبة.
      metadata:
        rephrase: true

  utter_uberfix_emergency:
    - text: |
        لحالات الصيانة العاجلة، اكتب نوع العطل والمنطقة ورقم التواصل.
        سنوجه الطلب لفريق UberFix المناسب بأسرع وقت.
      metadata:
        rephrase: true

  utter_laban_catalog:
    - text: |
        يمكننا مساعدتك في كتالوج خامات Laban Alasfour حسب نوع المنتج: بناء، تشطيب، دهانات، كهرباء، سباكة أو خامات بالجملة.
      metadata:
        rephrase: true

  utter_laban_bulk_order:
    - text: |
        لطلبات الجملة، ارسل نوع الخامة والكمية ومكان التسليم وسنجهز لك عرض سعر مناسب.
      metadata:
        rephrase: true

  utter_laban_delivery:
    - text: |
        التوصيل متاح حسب الكمية والمنطقة. ارسل موقع التسليم والمنتجات المطلوبة لتأكيد المدة والتكلفة.
      metadata:
        rephrase: true

  utter_laban_contact:
    - text: |
        للتواصل مع Laban Alasfour، ارسل اسمك ورقم هاتفك ونوع الخامات المطلوبة وسيتواصل معك فريق المبيعات.
      metadata:
        rephrase: true

