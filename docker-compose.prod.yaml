# ============================================================
# docker-compose.prod.yaml - Production stack
# Exposes only Nginx on 80/443. Internal services stay private.
# ============================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

x-common-env: &common-env
  env_file:
    - ${APP_ENV_FILE:-.env.production}

services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - alazab-net
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:?set DB_NAME}
      POSTGRES_USER: ${DB_USER:?set DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - alazab-net
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rasa:
    image: ${RASA_IMAGE:-rasa/rasa-pro:3.16.3}
    <<: *common-env
    volumes:
      - .:/app
      - rasa_models:/app/models
    environment:
      ACTION_SERVER_URL: http://rasa-actions:5055/webhook
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_USE_SSL: ${REDIS_USE_SSL:-false}
      RASA_TELEMETRY_ENABLED: "false"
    command: >
      run --enable-api --cors "${ALLOWED_ORIGINS}" --port 5005
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - alazab-net
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5005/').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  rasa-actions:
    build:
      context: .
      dockerfile: Dockerfile.actions
    <<: *common-env
    environment:
      OPENAI_HANDOFF_MODEL: gpt-4o-mini
    depends_on:
      rasa:
        condition: service_healthy
    networks:
      - alazab-net
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5055/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  webhook:
    build:
      context: .
      dockerfile: Dockerfile.webhook
    <<: *common-env
    environment:
      RASA_URL: http://rasa:5005
    command: >
      uvicorn webhook.server:app --host 0.0.0.0 --port 8000 --workers 2
    volumes:
      - uploads_data:/app/webhook/static/uploads
    depends_on:
      rasa:
        condition: service_healthy
    networks:
      - alazab-net
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./chatbot-widget:/usr/share/nginx/html/widget:ro
    depends_on:
      webhook:
        condition: service_healthy
      rasa:
        condition: service_healthy
    networks:
      - alazab-net
    restart: unless-stopped
    logging: *default-logging

networks:
  alazab-net:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
  rasa_models:
  uploads_data:

