<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AzaBot — مساعد مجموعة العزب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

<style>
/* ══════════════════════════════════════════════════════
   DEMO PAGE
══════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary:   #1a1a2e;
  --accent:    #e8b86d;
  --font:      'Cairo', sans-serif;
}

body {
  font-family: var(--font);
  background: #0d0d1a;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.demo-bg {
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 80% at 20% 20%, rgba(26,86,219,.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 80% 80%, rgba(126,58,242,.10) 0%, transparent 60%),
    #0d0d1a;
}

.demo-center {
  position: relative; z-index: 1;
  text-align: center; color: #e2e8f0;
}

.demo-center h1 {
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 900;
  background: linear-gradient(135deg, #e8b86d, #f4d98a, #c27803);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
}

.demo-center p {
  font-size: 16px; color: #64748b;
  margin-bottom: 40px;
}

.brand-pills {
  display: flex; gap: 10px; flex-wrap: wrap;
  justify-content: center; margin-bottom: 0;
}

.brand-pill {
  padding: 8px 18px; border-radius: 99px;
  border: 1.5px solid rgba(255,255,255,.1);
  background: rgba(255,255,255,.05);
  color: #94a3b8; font-family: var(--font);
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all .2s; display: flex; align-items: center; gap: 6px;
}

.brand-pill:hover, .brand-pill.active {
  border-color: var(--pill-color, #1a56db);
  background: rgba(255,255,255,.08);
  color: #fff;
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(0,0,0,.3);
}


/* ══════════════════════════════════════════════════════
   WIDGET ROOT
══════════════════════════════════════════════════════ */
#az-root * {
  box-sizing: border-box; margin: 0; padding: 0;
  font-family: 'Cairo', system-ui, sans-serif;
}

/* ── FAB Button ──────────────────────────────────────── */
#az-fab {
  position: fixed; bottom: 28px; left: 28px;
  width: 62px; height: 62px; border-radius: 50%;
  border: none; cursor: pointer;
  background: var(--b-color, #1a56db);
  box-shadow: 0 6px 28px rgba(0,0,0,.35), 0 0 0 0 var(--b-color, #1a56db);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999; transition: transform .25s, box-shadow .25s;
  animation: az-pulse 3s ease-in-out infinite 2s;
}

@keyframes az-pulse {
  0%,100% { box-shadow: 0 6px 28px rgba(0,0,0,.35), 0 0 0 0 var(--b-color, #1a56db); }
  50% { box-shadow: 0 6px 28px rgba(0,0,0,.35), 0 0 0 10px rgba(26,86,219,0); }
}

#az-fab:hover { transform: scale(1.08); }
#az-fab:active { transform: scale(.95); }

#az-fab svg { width: 28px; height: 28px; }
#az-fab.open svg.chat-ico { display: none; }
#az-fab.open svg.close-ico { display: block !important; }

.az-notif {
  position: absolute; top: -4px; right: -4px;
  width: 20px; height: 20px; border-radius: 50%;
  background: #ef4444; color: #fff;
  font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid #0d0d1a;
  animation: az-bounce-in .3s cubic-bezier(.34,1.56,.64,1);
}

@keyframes az-bounce-in {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

/* ── Panel ───────────────────────────────────────────── */
#az-panel {
  position: fixed; bottom: 106px; left: 28px;
  width: 370px; max-width: calc(100vw - 40px);
  background: #fff;
  border-radius: 22px;
  box-shadow: 0 24px 80px rgba(0,0,0,.22), 0 4px 16px rgba(0,0,0,.1);
  display: flex; flex-direction: column;
  max-height: 600px; z-index: 9998;
  transform-origin: bottom left;
  transition: opacity .3s cubic-bezier(.34,1.56,.64,1),
              transform .3s cubic-bezier(.34,1.56,.64,1);
  overflow: hidden;
}

#az-panel.az-hide {
  opacity: 0;
  transform: scale(.85) translateY(16px);
  pointer-events: none;
}

/* ── Header ──────────────────────────────────────────── */
#az-header {
  background: var(--b-color, #1a56db);
  padding: 0;
  border-radius: 22px 22px 0 0;
  position: relative; overflow: hidden;
  flex-shrink: 0;
}

.az-header-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 110% -10%, rgba(255,255,255,.18) 0%, transparent 50%),
    radial-gradient(circle at -10% 110%, rgba(0,0,0,.15) 0%, transparent 50%);
  pointer-events: none;
}

.az-header-top {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 18px 12px;
  direction: rtl;
}

.az-avatar-wrap {
  position: relative; flex-shrink: 0;
}

.az-avatar {
  width: 46px; height: 46px; border-radius: 50%;
  background: rgba(255,255,255,.2);
  border: 2px solid rgba(255,255,255,.35);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}

.az-online-dot {
  position: absolute; bottom: 1px; right: 1px;
  width: 12px; height: 12px; border-radius: 50%;
  background: #4ade80;
  border: 2px solid var(--b-color, #1a56db);
}

.az-header-info { flex: 1; direction: rtl; }
.az-header-info h3 { color: #fff; font-size: 15px; font-weight: 700; line-height: 1.2; }
.az-header-info p  { color: rgba(255,255,255,.75); font-size: 11px; margin-top: 2px; }

.az-close-btn {
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(255,255,255,.15); border: none;
  color: #fff; cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s; flex-shrink: 0;
  margin-right: auto;
}

.az-close-btn:hover { background: rgba(255,255,255,.25); }

/* Tabs */
.az-tabs {
  display: flex; direction: rtl;
  border-top: 1px solid rgba(255,255,255,.15);
}

.az-tab {
  flex: 1; padding: 9px 0;
  background: transparent; border: none;
  color: rgba(255,255,255,.65);
  font-family: 'Cairo', sans-serif;
  font-size: 12px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: all .2s; position: relative;
}

.az-tab.active { color: #fff; }

.az-tab.active::after {
  content: '';
  position: absolute; bottom: 0; left: 10%; right: 10%;
  height: 2px; border-radius: 2px;
  background: rgba(255,255,255,.9);
}

/* ── Body ────────────────────────────────────────────── */
.az-pane { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.az-pane.active { display: flex; }

/* Text chat */
#az-messages {
  flex: 1; overflow-y: auto; padding: 16px;
  background: #f8fafc;
  display: flex; flex-direction: column; gap: 10px;
  min-height: 200px; max-height: 330px;
  direction: rtl;
  scroll-behavior: smooth;
}

#az-messages::-webkit-scrollbar { width: 3px; }
#az-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

/* Welcome Screen */
.az-welcome {
  display: flex; flex-direction: column;
  align-items: center; padding: 16px 8px 8px;
  gap: 6px; direction: rtl;
}

.az-welcome-icon {
  width: 64px; height: 64px; border-radius: 50%;
  background: linear-gradient(135deg, var(--b-color), var(--b-dark, #0c3a8a));
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; margin-bottom: 4px;
  box-shadow: 0 8px 24px rgba(0,0,0,.15);
}

.az-welcome h4 { font-size: 16px; font-weight: 700; color: #0f172a; }
.az-welcome p  { font-size: 12px; color: #64748b; }

.az-quick-btns {
  display: flex; flex-wrap: wrap; gap: 7px;
  justify-content: center; padding: 4px 0 8px;
  direction: rtl; width: 100%;
}

.az-qbtn {
  padding: 7px 13px; border-radius: 99px;
  border: 1.5px solid var(--b-color, #1a56db);
  background: #fff; color: var(--b-color, #1a56db);
  font-family: 'Cairo', sans-serif;
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: all .18s; white-space: nowrap;
}

.az-qbtn:hover {
  background: var(--b-color, #1a56db);
  color: #fff; transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(0,0,0,.15);
}

/* Messages */
.az-msg { display: flex; gap: 7px; direction: rtl; }
.az-msg.user { flex-direction: row; justify-content: flex-start; }
.az-msg.bot  { flex-direction: row-reverse; justify-content: flex-start; }

.az-msg-av {
  width: 28px; height: 28px; border-radius: 50%;
  background: #f1f5f9; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; margin-top: 2px;
}

.az-bubble {
  max-width: 80%; padding: 9px 13px;
  font-size: 13px; line-height: 1.6;
  animation: az-msg-in .22s ease both;
}

@keyframes az-msg-in {
  from { opacity: 0; transform: translateY(6px) scale(.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.az-msg.user .az-bubble {
  background: var(--b-color, #1a56db); color: #fff;
  border-radius: 4px 18px 18px 18px;
}

.az-msg.bot .az-bubble {
  background: #fff; color: #0f172a;
  border-radius: 18px 4px 18px 18px;
  box-shadow: 0 1px 6px rgba(0,0,0,.07);
}

/* Typing indicator */
.az-typing .az-bubble {
  background: #fff;
  box-shadow: 0 1px 6px rgba(0,0,0,.07);
  border-radius: 18px 4px 18px 18px;
  padding: 12px 16px;
  display: flex; gap: 5px; align-items: center;
}

.az-typing .az-bubble span {
  width: 7px; height: 7px; border-radius: 50%;
  background: #94a3b8;
  animation: az-dot 1.3s ease-in-out infinite;
}

.az-typing .az-bubble span:nth-child(2) { animation-delay: .18s; }
.az-typing .az-bubble span:nth-child(3) { animation-delay: .36s; }

@keyframes az-dot {
  0%,80%,100% { transform: scale(1); opacity: .5; }
  40% { transform: scale(1.5); opacity: 1; }
}

/* Nav menu in messages */
.az-nav-menu {
  background: #fff;
  border: 1px solid #f1f5f9;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,.06);
  direction: rtl;
}

.az-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px;
  border-bottom: 1px solid #f8fafc;
  cursor: pointer; font-size: 13px;
  color: #334155; transition: background .15s;
  font-weight: 500;
}

.az-nav-item:last-child { border-bottom: none; }
.az-nav-item:hover { background: #f8fafc; }

.az-nav-item .ni-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--b-color), var(--b-dark));
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}

.az-nav-arrow { margin-right: auto; color: #94a3b8; font-size: 12px; }

/* ── Input ───────────────────────────────────────────── */
#az-footer {
  padding: 12px; background: #fff;
  border-top: 1px solid #f1f5f9;
  border-radius: 0 0 22px 22px;
  flex-shrink: 0; direction: rtl;
}

.az-input-row {
  display: flex; align-items: center; gap: 8px;
  background: #f8fafc; border-radius: 99px;
  padding: 6px 6px 6px 12px;
  border: 1.5px solid #e2e8f0;
  transition: border-color .2s;
}

.az-input-row:focus-within { border-color: var(--b-color, #1a56db); }

#az-input {
  flex: 1; background: transparent; border: none;
  font-family: 'Cairo', sans-serif;
  font-size: 13px; color: #0f172a; outline: none;
  direction: rtl;
}

#az-input::placeholder { color: #94a3b8; }

.az-action-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform .15s, background .15s; flex-shrink: 0;
}

.az-action-btn:active { transform: scale(.9); }

.az-attach-btn { background: #f1f5f9; color: #64748b; }
.az-attach-btn:hover { background: #e2e8f0; }

.az-send-btn {
  background: var(--b-color, #1a56db); color: #fff;
}

.az-send-btn:hover { opacity: .88; transform: scale(1.05); }
.az-send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

.az-powered {
  text-align: center; font-size: 10px; color: #94a3b8;
  margin-top: 8px; letter-spacing: .02em;
}

/* ── Voice Pane ──────────────────────────────────────── */
#az-voice-pane {
  flex: 1; display: none; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; padding: 28px; min-height: 280px;
  background: #f8fafc;
}

#az-voice-pane.active { display: flex; }

.az-voice-circle {
  width: 100px; height: 100px; border-radius: 50%;
  background: #f1f5f9;
  border: 2px solid #e2e8f0;
  display: flex; align-items: center; justify-content: center;
  position: relative; transition: all .3s;
}

.az-voice-circle.listening {
  background: rgba(255,255,255,.9);
  border-color: var(--b-color);
  box-shadow:
    0 0 0 12px rgba(26,86,219,.08),
    0 0 0 24px rgba(26,86,219,.04);
  animation: az-listen-pulse 1.5s ease-in-out infinite;
}

@keyframes az-listen-pulse {
  0%,100% { box-shadow: 0 0 0 8px rgba(26,86,219,.08), 0 0 0 16px rgba(26,86,219,.04); }
  50%      { box-shadow: 0 0 0 16px rgba(26,86,219,.08), 0 0 0 32px rgba(26,86,219,.03); }
}

.az-mic-icon { font-size: 38px; }

.az-voice-label {
  font-size: 14px; color: #64748b; font-weight: 500;
}

.az-mic-btn {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--b-color, #1a56db); border: none;
  color: #fff; cursor: pointer; font-size: 26px;
  box-shadow: 0 8px 24px rgba(0,0,0,.2);
  transition: transform .2s;
  display: flex; align-items: center; justify-content: center;
}

.az-mic-btn:hover { transform: scale(1.08); }
.az-mic-btn:active { transform: scale(.95); }
.az-mic-btn.recording { background: #ef4444; animation: az-rec-pulse .8s ease infinite; }
@keyframes az-rec-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }

.az-voice-hint { font-size: 11px; color: #94a3b8; }

/* ── Scrollbar ───────────────────────────────────────── */
#az-messages { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }

/* ── Responsive ──────────────────────────────────────── */
@media (max-width: 420px) {
  #az-panel { left: 12px; right: 12px; width: auto; bottom: 96px; }
  #az-fab   { left: 16px; bottom: 16px; }
}
</style>
</head>
<body>

<!-- Demo Background -->
<div class="demo-bg"></div>
<div class="demo-center">
  <h1>🏗️ مجموعة العزب</h1>
  <p>اضغط على زر الدردشة في الزاوية لتجربة البوت</p>
  <div class="brand-pills">
    <button class="brand-pill active" style="--pill-color:#1a56db"
      onclick="switchBrand('alazab_construction',this)">🏗️ Alazab</button>
    <button class="brand-pill" style="--pill-color:#c27803"
      onclick="switchBrand('luxury_finishing',this)">✨ Luxury</button>
    <button class="brand-pill" style="--pill-color:#7e3af2"
      onclick="switchBrand('brand_identity',this)">🎨 Brand</button>
    <button class="brand-pill" style="--pill-color:#057a55"
      onclick="switchBrand('uberfix',this)">🔧 UberFix</button>
    <button class="brand-pill" style="--pill-color:#e3a008"
      onclick="switchBrand('laban_alasfour',this)">🧱 Laban</button>
  </div>
</div>

<!-- ══ WIDGET ══════════════════════════════════════════ -->
<div id="az-root">

  <!-- FAB -->
  <button id="az-fab" onclick="azToggle()" aria-label="فتح المحادثة">
    <span class="az-notif" id="az-notif">1</span>
    <!-- Chat icon -->
    <svg class="chat-ico" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2C6.477 2 2 6.34 2 11.667c0 2.614 1.075 4.98 2.82 6.72L4 22l3.887-1.333C9.146 21.2 10.54 21.333 12 21.333 17.523 21.333 22 16.993 22 11.667 22 6.34 17.523 2 12 2z" fill="white"/>
      <circle cx="8.5" cy="12" r="1.2" fill="currentColor" opacity=".5"/>
      <circle cx="12" cy="12" r="1.2" fill="currentColor" opacity=".5"/>
      <circle cx="15.5" cy="12" r="1.2" fill="currentColor" opacity=".5"/>
    </svg>
    <!-- Close icon -->
    <svg class="close-ico" style="display:none" viewBox="0 0 24 24" fill="none">
      <path d="M18 6L6 18M6 6l12 12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- Panel -->
  <div id="az-panel" class="az-hide">

    <!-- Header -->
    <div id="az-header">
      <div class="az-header-bg"></div>
      <div class="az-header-top">
        <button class="az-close-btn" onclick="azToggle()">✕</button>
        <div class="az-header-info">
          <h3 id="az-bot-name">عزبوت (AzaBot)</h3>
          <p id="az-bot-sub">المساعد الذكي - متصل الآن</p>
        </div>
        <div class="az-avatar-wrap">
          <div class="az-avatar" id="az-avatar">🏗️</div>
          <div class="az-online-dot"></div>
        </div>
      </div>
      <div class="az-tabs">
        <button class="az-tab active" onclick="azTab('text',this)">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
            <path d="M2 2h12a1 1 0 011 1v8a1 1 0 01-1 1H5l-3 3V3a1 1 0 011-1z"/>
          </svg>
          محادثة نصية
        </button>
        <button class="az-tab" onclick="azTab('voice',this)">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 1a3 3 0 013 3v5a3 3 0 01-6 0V4a3 3 0 013-3zm5 8a5 5 0 01-10 0H2a6 6 0 0011.9 1H13z"/>
          </svg>
          محادثة صوتية
        </button>
      </div>
    </div>

    <!-- TEXT PANE -->
    <div class="az-pane active" id="az-text-pane">
      <div id="az-messages">
        <!-- Welcome -->
        <div class="az-welcome" id="az-welcome">
          <div class="az-welcome-icon" id="az-w-icon">🏗️</div>
          <h4>مرحباً! أنا عزبوت 👋</h4>
          <p>كيف يمكنني مساعدتك؟</p>
          <div class="az-quick-btns" id="az-qbtns">
            <button class="az-qbtn" onclick="azSend(this.textContent)">ما هي خدمات الشركة؟</button>
            <button class="az-qbtn" onclick="azSend(this.textContent)">أريد عرض سعر تشطيب</button>
            <button class="az-qbtn" onclick="azSend(this.textContent)">ما هي أسعار التشطيب؟</button>
            <button class="az-qbtn" onclick="azSend(this.textContent)">ما هي فروع الشركة؟</button>
          </div>
        </div>
      </div>

      <div id="az-footer">
        <div class="az-input-row">
          <button class="az-action-btn az-send-btn" id="az-send-btn"
            onclick="azSendInput()" aria-label="إرسال">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"
                stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="az-action-btn az-attach-btn" onclick="azToggleNav()" aria-label="القائمة">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <input type="text" id="az-input" placeholder="اكتب رسالتك..."
            onkeydown="if(event.key==='Enter')azSendInput()">
        </div>
        <div class="az-powered">مدعوم بالذكاء الاصطناعي · قد يخطئ أحياناً</div>
      </div>
    </div>

    <!-- VOICE PANE -->
    <div id="az-voice-pane">
      <div class="az-voice-circle" id="az-voice-circle">
        <span class="az-mic-icon">🎙️</span>
      </div>
      <div class="az-voice-label" id="az-voice-label">اضغط للتحدث مع عزبوت</div>
      <button class="az-mic-btn" id="az-mic-btn" onclick="azToggleMic()">🎤</button>
      <div class="az-voice-hint">اضغط للبدء · اضغط مجدداً للإيقاف</div>
      <div class="az-powered">مدعوم بالذكاء الاصطناعي · قد يخطئ أحياناً</div>
    </div>

  </div><!-- /panel -->
</div><!-- /root -->

<script>
/* ══════════════════════════════════════════════════════
   CONFIG & STATE
══════════════════════════════════════════════════════ */
const API_URL = window.CHAT_API_URL || `${location.origin}/chat`;

const BRANDS = {
  alazab_construction: {
    name:'عزبوت (AzaBot)', sub:'المساعد الذكي - متصل الآن',
    icon:'🏗️', color:'#1a56db', dark:'#0c3a8a',
    btns:['ما هي خدمات الشركة؟','أريد عرض سعر','مشاريعنا','تواصل مع مهندس'],
    welcome:'مرحباً! أنا عزبوت 👋'
  },
  luxury_finishing: {
    name:'لاكشري بوت', sub:'مستشار التشطيبات الراقية - متصل',
    icon:'✨', color:'#c27803', dark:'#7a4b00',
    btns:['خدمات التشطيب','معاينة مجانية','أسعار التشطيب','الخامات'],
    welcome:'أهلاً! أنا لاكشري بوت ✨'
  },
  brand_identity: {
    name:'براند بوت', sub:'خبير الهوية البصرية - متصل',
    icon:'🎨', color:'#7e3af2', dark:'#4c1d99',
    btns:['تصميم شعار','تجهيز محل','القطاعات','مراحل العمل'],
    welcome:'مرحباً! أنا براند بوت 🎨'
  },
  uberfix: {
    name:'فيكس بوت', sub:'منصة الصيانة الذكية - متصل',
    icon:'🔧', color:'#057a55', dark:'#03452f',
    btns:['طلب صيانة','باقات الاشتراك','تتبع طلبي','طوارئ 24/7'],
    welcome:'مرحباً! أنا فيكس بوت 🔧'
  },
  laban_alasfour: {
    name:'لبن بوت', sub:'مستشار التوريدات - متصل',
    icon:'🧱', color:'#e3a008', dark:'#865a00',
    btns:['عرض الكتالوج','طلب جملة','التوصيل','أسعار المواد'],
    welcome:'مرحباً! أنا لبن بوت 🧱'
  },
};

const NAV_ITEMS = [
  {label:'الرئيسية',    icon:'🏠', href:'/'},
  {label:'خدماتنا',    icon:'⚙️', href:'/services'},
  {label:'مشاريعنا',   icon:'📁', href:'/projects'},
  {label:'طلب عرض سعر',icon:'💰', href:'/quote'},
  {label:'من نحن',     icon:'ℹ️', href:'/about'},
  {label:'تواصل معنا', icon:'📞', href:'/contact'},
];

let currentBrand = 'alazab_construction';
let senderId = localStorage.getItem('az_sid') || ('web_' + Math.random().toString(36).slice(2,10));
localStorage.setItem('az_sid', senderId);

let isOpen   = false;
let navShown = false;
let isRecording = false;
let mediaRec = null;

/* ══════════════════════════════════════════════════════
   BRAND SWITCHING
══════════════════════════════════════════════════════ */
function applyBrand(key) {
  const b = BRANDS[key];
  if (!b) return;
  currentBrand = key;

  const r = document.documentElement;
  document.getElementById('az-fab').style.background  = b.color;
  document.getElementById('az-fab').style.setProperty('--b-color', b.color);
  document.querySelector('#az-root').style.setProperty('--b-color', b.color);
  document.querySelector('#az-root').style.setProperty('--b-dark', b.dark);

  document.getElementById('az-header').style.background =
    `linear-gradient(135deg, ${b.color}, ${b.dark})`;
  document.getElementById('az-bot-name').textContent = b.name;
  document.getElementById('az-bot-sub').textContent  = b.sub;
  document.getElementById('az-avatar').textContent   = b.icon;
  document.getElementById('az-w-icon').textContent   = b.icon;
  document.getElementById('az-voice-label').textContent = `اضغط للتحدث مع ${b.name}`;

  // Quick buttons
  const qc = document.getElementById('az-qbtns');
  qc.innerHTML = b.btns.map(t =>
    `<button class="az-qbtn" onclick="azSend('${t}')">${t}</button>`
  ).join('');

  // Welcome
  document.querySelector('#az-welcome h4').textContent = b.welcome;

  // Online dot color
  document.querySelector('.az-online-dot').style.borderColor = b.color;

  // Mic btn
  document.getElementById('az-mic-btn').style.background = b.color;
}

function switchBrand(key, btn) {
  document.querySelectorAll('.brand-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  applyBrand(key);

  // Reset messages
  const msgs = document.getElementById('az-messages');
  msgs.innerHTML = document.getElementById('az-welcome').outerHTML;
  // Re-show welcome (it was moved, re-add)
  resetMessages();
}

function resetMessages() {
  const b = BRANDS[currentBrand];
  const msgs = document.getElementById('az-messages');
  msgs.innerHTML = `
    <div class="az-welcome" id="az-welcome">
      <div class="az-welcome-icon" id="az-w-icon">${b.icon}</div>
      <h4>${b.welcome}</h4>
      <p>كيف يمكنني مساعدتك؟</p>
      <div class="az-quick-btns" id="az-qbtns">
        ${b.btns.map(t => `<button class="az-qbtn" onclick="azSend('${t}')">${t}</button>`).join('')}
      </div>
    </div>`;
}

/* ══════════════════════════════════════════════════════
   PANEL TOGGLE
══════════════════════════════════════════════════════ */
function azToggle() {
  isOpen = !isOpen;
  const panel = document.getElementById('az-panel');
  const fab   = document.getElementById('az-fab');
  const notif = document.getElementById('az-notif');

  panel.classList.toggle('az-hide', !isOpen);
  fab.classList.toggle('open', isOpen);

  if (isOpen) {
    notif.style.display = 'none';
    setTimeout(() => document.getElementById('az-input').focus(), 300);
  }
}

/* ══════════════════════════════════════════════════════
   TABS
══════════════════════════════════════════════════════ */
function azTab(type, btn) {
  document.querySelectorAll('.az-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  const textPane  = document.getElementById('az-text-pane');
  const voicePane = document.getElementById('az-voice-pane');

  if (type === 'text') {
    textPane.classList.add('active');
    textPane.style.display = 'flex';
    voicePane.style.display = 'none';
    voicePane.classList.remove('active');
  } else {
    textPane.classList.remove('active');
    textPane.style.display = 'none';
    voicePane.style.display = 'flex';
    voicePane.classList.add('active');
  }
}

/* ══════════════════════════════════════════════════════
   NAV MENU
══════════════════════════════════════════════════════ */
function azToggleNav() {
  const b = BRANDS[currentBrand];
  const msgs = document.getElementById('az-messages');

  if (navShown) {
    const menu = msgs.querySelector('.az-nav-menu');
    if (menu) menu.closest('.az-msg').remove();
    navShown = false;
    return;
  }

  navShown = true;
  const div = document.createElement('div');
  div.className = 'az-msg bot';
  div.innerHTML = `
    <div class="az-msg-av">${b.icon}</div>
    <div class="az-nav-menu">
      ${NAV_ITEMS.map(n => `
        <div class="az-nav-item" onclick="azNavGo('${n.href}','${n.label}')">
          <div class="ni-icon">${n.icon}</div>
          <span>${n.label}</span>
          <span class="az-nav-arrow">‹</span>
        </div>`).join('')}
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function azNavGo(href, label) {
  navShown = false;
  azSend('أريد زيارة صفحة ' + label);
}

/* ══════════════════════════════════════════════════════
   MESSAGING
══════════════════════════════════════════════════════ */
function azSendInput() {
  const inp = document.getElementById('az-input');
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value = '';
  azSend(txt);
}

async function azSend(text) {
  // Hide welcome & nav if present
  const welcome = document.getElementById('az-welcome');
  if (welcome) welcome.remove();
  const menu = document.querySelector('.az-nav-menu');
  if (menu) { menu.closest('.az-msg').remove(); navShown = false; }

  const msgs = document.getElementById('az-messages');

  // User bubble
  msgs.appendChild(makeBubble('user', text));
  msgs.scrollTop = msgs.scrollHeight;

  // Typing indicator
  const typing = makeTyping();
  msgs.appendChild(typing);
  msgs.scrollTop = msgs.scrollHeight;

  document.getElementById('az-send-btn').disabled = true;

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        sender_id: senderId,
        message: text,
        brand: currentBrand,
        channel: 'website',
        site_host: location.hostname,
        site_path: location.pathname
      })
    });

    typing.remove();

    if (!res.ok) throw new Error('HTTP ' + res.status);

    const payload = await res.json();
    const data = Array.isArray(payload.responses) ? payload.responses : [];

    if (!data || !data.length) {
      msgs.appendChild(makeBubble('bot', 'عذراً، لم أفهم طلبك. هل يمكنك إعادة الصياغة؟'));
    } else {
      for (const item of data) {
        if (item.text) {
          await sleep(120);
          msgs.appendChild(makeBubble('bot', item.text));
          msgs.scrollTop = msgs.scrollHeight;
        }
      }
    }
  } catch (e) {
    typing.remove();
    msgs.appendChild(makeBubble('bot',
      'يبدو أن هناك مشكلة في الاتصال. يرجى المحاولة لاحقاً أو التواصل معنا مباشرة. 📞'
    ));
  }

  msgs.scrollTop = msgs.scrollHeight;
  document.getElementById('az-send-btn').disabled = false;
  document.getElementById('az-input').focus();
}

function makeBubble(role, text) {
  const b = BRANDS[currentBrand];
  const div = document.createElement('div');
  div.className = `az-msg ${role}`;
  const escaped = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
  div.innerHTML = role === 'bot'
    ? `<div class="az-msg-av">${b.icon}</div><div class="az-bubble">${escaped}</div>`
    : `<div class="az-bubble">${escaped}</div>`;
  return div;
}

function makeTyping() {
  const b = BRANDS[currentBrand];
  const div = document.createElement('div');
  div.className = 'az-msg bot az-typing';
  div.innerHTML = `<div class="az-msg-av">${b.icon}</div>
    <div class="az-bubble"><span></span><span></span><span></span></div>`;
  return div;
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

/* ══════════════════════════════════════════════════════
   VOICE
══════════════════════════════════════════════════════ */
async function azToggleMic() {
  const btn    = document.getElementById('az-mic-btn');
  const circle = document.getElementById('az-voice-circle');
  const label  = document.getElementById('az-voice-label');

  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio: true});
      const chunks = [];
      mediaRec = new MediaRecorder(stream);
      mediaRec.ondataavailable = e => chunks.push(e.data);
      mediaRec.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(chunks, {type:'audio/webm'});
        label.textContent = 'جاري معالجة الصوت...';
        btn.disabled = true;

        // Switch to text pane to show response
        azTab('text', document.querySelectorAll('.az-tab')[0]);
        await azSend('[رسالة صوتية]');

        label.textContent = `اضغط للتحدث مع ${BRANDS[currentBrand].name}`;
        btn.disabled = false;
      };
      mediaRec.start();
      isRecording = true;
      btn.textContent = '⏹️';
      btn.classList.add('recording');
      circle.classList.add('listening');
      label.textContent = 'جاري الاستماع... اضغط للإيقاف';
    } catch(e) {
      label.textContent = 'تعذّر الوصول للميكروفون';
    }
  } else {
    if (mediaRec) mediaRec.stop();
    isRecording = false;
    btn.textContent = '🎤';
    btn.classList.remove('recording');
    circle.classList.remove('listening');
  }
}

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
applyBrand('alazab_construction');

// Show notification after 3 seconds
setTimeout(() => {
  const notif = document.getElementById('az-notif');
  if (!isOpen) notif.style.display = 'flex';
}, 3000);
</script>
