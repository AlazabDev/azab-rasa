# ============================================================
#  docker-compose.yaml — Alazab Group Chatbot Stack
#  الخدمات: Rasa Pro، Actions، Webhook، Redis، PostgreSQL، Nginx
# ============================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

services:

  # ── Redis (Tracker Store) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - alazab-net
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL (Events / History) ────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       alazab_chatbot
      POSTGRES_USER:     alazab_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - alazab-net
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alazab_user -d alazab_chatbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Rasa Pro Server ───────────────────────────────────────
  rasa:
    image: rasa/rasa-pro:3.16.3
    env_file:
      - .env
    ports:
      - "127.0.0.1:5005:5005"
    volumes:
      - .:/app
      - rasa_models:/app/models
    environment:
      ACTION_SERVER_URL:      http://rasa-actions:5055/webhook
      DB_HOST:                postgres
      DB_PORT:                5432
      DB_NAME:                ${DB_NAME}
      DB_USER:                ${DB_USER}
      DB_PASSWORD:            ${DB_PASSWORD}
      REDIS_HOST:             redis
      REDIS_PORT:             6379
      REDIS_PASSWORD:         ${REDIS_PASSWORD}
      REDIS_USE_SSL:          ${REDIS_USE_SSL:-false}
      RASA_TELEMETRY_ENABLED: "false"
    command: >
      run --enable-api --cors "*" --port 5005
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - alazab-net
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5005/').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Actions Server ────────────────────────────────────────
  rasa-actions:
    build:
      context: .
      dockerfile: Dockerfile.actions
    env_file:
      - .env
    ports:
      - "127.0.0.1:5055:5055"
    environment:
      OPENAI_HANDOFF_MODEL: gpt-4o-mini
    depends_on:
      rasa:
        condition: service_healthy
    networks:
      - alazab-net
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5055/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Webhook / FastAPI Server ──────────────────────────────
  webhook:
    build:
      context: .
      dockerfile: Dockerfile.webhook
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      RASA_URL:              http://rasa:5005
    command: >
      uvicorn webhook.server:app --host 0.0.0.0 --port 8000 --workers 2
    depends_on:
      rasa:
        condition: service_healthy
    networks:
      - alazab-net
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Nginx (Reverse Proxy + SSL) ───────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./chatbot-widget:/usr/share/nginx/html/widget:ro
    depends_on:
      - webhook
      - rasa
    networks:
      - alazab-net
    restart: unless-stopped
    logging: *default-logging

networks:
  alazab-net:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
  rasa_models:
