# ============================================================
#  nginx.conf — Reverse Proxy لـ Alazab Group Chatbot
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    client_max_body_size 16M;
    server_tokens off;

    # ── Security Headers ──────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"  always;
    add_header X-Content-Type-Options   "nosniff"     always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Rate Limiting ─────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/s;

    # ── Gzip ─────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json
               application/javascript text/xml application/xml;

    # ── HTTP → HTTPS Redirect ────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS Server ────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name bot.alazab.com www.bot.alazab.com;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Chatbot Widget (Static) ──────────────────────
        location /widget {
            alias /usr/share/nginx/html/widget;
            index index.html;
            try_files $uri $uri/ /widget/index.html;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # ── Chat API ─────────────────────────────────────
        location /chat {
            limit_req zone=chat_limit burst=20 nodelay;
            proxy_pass         http://webhook:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Uri   $request_uri;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # ── Meta Webhook (WhatsApp + Messenger) ──────────
        location /webhook/meta {
            proxy_pass         http://webhook:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Telegram Webhook ──────────────────────────────
        location /webhook/telegram {
            proxy_pass         http://webhook:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── General API ──────────────────────────────────
        location / {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass         http://webhook:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Uri   $request_uri;
        }
    }

    # ── Rasa: Internal Only ───────────────────────────────
    server {
        listen 5005;
        server_name _;

        location / {
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny  all;
            proxy_pass http://rasa:5005;
        }
    }
}


